name: Release

# À chaque merge sur main : si la version de app/src-tauri/tauri.conf.json a
# changé (et qu'aucun tag ne l'a déjà publiée), build macOS universal et publie
# une release GitHub avec le .dmg.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "value=$(node -p "require('./app/src-tauri/tauri.conf.json').version")" >> "$GITHUB_OUTPUT"

      - name: Tag already published ?
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install deps
        working-directory: app
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Signature OTA (minisign) : génère les .sig + latest.json de l'updater.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Codesign Apple non signé pour l'instant. Pour signer + notariser, ajoute
          # les 6 secrets Apple puis remets-les ici en env (jamais vides : un
          # APPLE_CERTIFICATE vide fait échouer le codesign).
        with:
          projectPath: app
          tagName: v${{ env.VERSION }}
          releaseName: v${{ env.VERSION }}
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
